<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0C4A6E">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- v: incrementare a ogni modifica di CSS/JS per aggiornamento immediato -->
  <title>La Guida di Samuele</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css?v=3">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header class="header">
    <div>
      <h1 id="site-name">…</h1>
      <p id="tagline" class="tagline"></p>
      <a id="weather" class="weather-chip" hidden target="_blank" rel="noopener"></a>
    </div>
    <div class="lang-switch" role="group" aria-label="Lingua / Language">
      <button id="lang-it" class="lang-btn" type="button">🇮🇹</button>
      <button id="lang-en" class="lang-btn" type="button">🇬🇧</button>
    </div>
  </header>

  <nav id="tabs" class="tabs" role="tablist"></nav>
  <div id="subfilters" class="subfilters" hidden></div>
  <div class="toolbar">
    <div id="sort" class="sort" role="group" aria-label="Ordina / Sort"></div>
    <button id="view-toggle" class="view-toggle" type="button"></button>
  </div>

  <main id="cards" class="cards" aria-live="polite"></main>
  <div id="map" class="map" hidden></div>

  <footer class="footer">
    <a id="wa-footer" class="fab" href="#" target="_blank" rel="noopener">💬<span></span></a>
  </footer>

  <section id="detail" class="detail" hidden></section>

  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
