name: Deploy su GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepara sito pubblico (esclude admin e file di lavoro)
        run: |
          mkdir _site
          rsync -a --exclude admin.html --exclude 'js/admin*' --exclude docs \
            --exclude scripts --exclude tests --exclude .github \
            --exclude '*.rtf' --exclude _site --exclude .superpowers --exclude .claude ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deployment
        uses: actions/deploy-pages@v4
